<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Bestie 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="toggleTheme()">🌈 Theme</button>

<img src="assets/images/piggy.png" class="piggy">

<h1 id="text"></h1>

<!-- Cake -->
<div id="cake" class="hidden">
    <img src="assets/images/cake.png">
    <img src="assets/images/knife.png" id="knife">
</div>

<button onclick="cutCake()">Cut Cake 🔪</button>

<div id="gift">🎁</div>

<h2 id="final" class="hidden">🎉 Happy Birthday Bestie 😎🔥</h2>

<!-- Gallery -->
<div class="gallery">
    <img src="assets/images/photo1.jpg">
    <img src="assets/images/photo2.jpg">
    <img src="assets/images/photo3.jpg">
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="assets/audio/birthday.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
